noApi: 未指定 API
noop: 无
unknownError: 未知错误。
failed: |-
  {quote}{time}
  {error}
failed-md: |-
  **{time}**
  {error}
cat: |-
  --- {name}Cat 信息 ---
  运行平台: {platform}
  机器人版本: {version}
  Koishi 版本：{koishiVersion}
  {implName} 版本：{implVersion}@{qqProtocolType}-{qqProtocolVersion}
  运行时间: {time}
commands:
  na:
    description: NodeAsync Bot
  cxgame:
    description: 查询服务器当前人数。
    messages:
      msg: |-
        {time}{list}
        进服指南请在群公告中查看。
      msg-md: |-
        *{time}*

        ---
        {list}

        ---

        进服指南请在群公告中查看。
      list: |-
        【{name} 服务器 {count}】
        ➣ {version}：{players}
        ➣ {ne}：{list}
        ➣ 备注：{note}
      list-md: |-
        ## {name} 服务器 {count}

        - {version}：{players}
        - {ne}：{list}
        - 备注：{note}
      listFailed: |-
        【{name} 服务器 {count}】
        ➣ 查询失败：{data}
        ➣ 请稍后重试。
        ➣ 备注：{note}
      listFailed-md: |-
        ## {name} 服务器 {count}

        - 查询失败：{data}
        - 请稍后重试。
        - 备注：{note}
      timeout: 请求超时。
      fewData: 服务端返回的数据过少。
      close: 服务器已关闭。
      host: 没有到主机的路由。
      dns: 解析失败。
      ne-a2s: 机器人
      ne-mc: 玩家列表
      forbidden: 此指令不允许在本群使用。
      failed: 查询失败：
  status:
    description: 查询机器人状态。
    messages:
      msg: |-
        {time}
        --- 系统状态 ---
        系统名称：{name}
        CPU 使用率：{cpu}
        内存使用率：{memory}
        --- 机器人状态 ---
        昨日收/发消息数量：{msgCount}
        机器人版本：{version}
        Koishi 版本：{koishiVersion}
        {implName} 版本：{implVersion}@{qqProtocolType}-{qqProtocolVersion}
        运行时间：{online}
      msg-md: |-
        *{time}*

        ---

        ## 系统状态

        - 系统名称：{name}
        - CPU 使用率：{cpu}
        - 内存使用率：{memory}

        ## 机器人状态

        - 昨日收/发消息数量：{msgCount}
        - 机器人版本：{version}
        - Koishi 版本：{koishiVersion}
        - 运行时间：{online}
      error: 状态获取失败。
  random:
    description: 随机数生成器。
    usage: |-
      缺少参数时默认生成 0-10000 的随机数。
      使用示例：
    examples: random 1 128 生成1到128范围的随机数
    messages:
      msg: |-
        {time}
        生成了一个随机数：{data}
      msg-md: |-
        *{time}*

        ---

        生成了一个随机数：{data}
  info:
    description: 查询机器人信息。
    messages:
      msg: |-
        {time}
        --- NodeAsync {version} ---
        私有机器人，服务器专用。
        --- 开发者 ---
        德二吹风机（3112836258）
        --- 其他 ---
        Node.js 版本：{nodeVersion}
        Koishi 版本：{koishiVersion}
        {implName} 版本：{implVersion}@{qqProtocolType}-{qqProtocolVersion}
        开源地址：https://github.com/ccd2s/node-async-bot-all
        官网：https://www.tasaed.top
      msg-md: |-
        *{time}*

        ---

        ## NodeAsync {version}

        私有机器人，服务器专用。

        ## 开发者

        - 德二吹风机（3112836258）

        ## 其他

        - Node.js 版本：{nodeVersion}
        - Koishi 版本：{koishiVersion}
        - 开源地址：https://github.com/ccd2s/node-async-bot-all
        - 官网：https://www.tasaed.top
  centerservertest:
    description: 查看中心服务器状态。
    messages:
      msg: |-
        {time}{list}
      msg-md: |-
        *{time}*

        ---
        {list}
      list: |-
        == {name} ==
        状态：{status}
        存活率：{uptime}
        检测时间：{time}
      list-md: |-
        ## {name}

        - 状态：{status}
        - 存活率：{uptime}
        - 检测时间：{time}
      listFailed: |-
        == {name} ==
        查看失败：{data}
      listFailed-md: |-
        ## {name}

        查看失败：{data}
      statusLive: ✅ 正常
      statusDie: ❌ 故障
      dataFail: 未能获取到此服务器的状态信息。
  getqqinfo:
    description: 获取 QQ 号的信息。
    usage: |-
      获取 QQ 号的信息。
    examples: getqqinfo 10001
    messages:
      msg: |-
        {quote}{image}
      failed: |-
        {quote}{time}
        获取失败：{data}
      command: QQ 号不正确。
  msg2img:
    description: 引用一个消息并使用此指令，即可将消息转图。
    usage: |-
      引用一条消息，/m。（不要带@）
    messages:
      msg: |-
        {quote}{image}
      failed: |-
        {quote}{time}
        获取失败：{data}
      null: 未引用任何消息。
      matroska: |-
        {quote}禁止套娃！
  steamnews:
    description: 抓取 Steam 游戏的最新新闻。
